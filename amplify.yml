version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || true
        - npm ci
    build:
      commands:
        - echo "VITE_S3_BUCKET_URL=https://s3.us-east-1.amazonaws.com/tours.luminaspatial.net" >> .env
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: X-Frame-Options
          value: SAMEORIGIN
        - key: X-Content-Type-Options
          value: nosniff
        - key: Referrer-Policy
          value: strict-origin-when-cross-origin
    - pattern: 'assets/**/*'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
