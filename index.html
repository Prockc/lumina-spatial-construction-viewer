<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#DB146B" />
    <meta
      name="description"
      content="Lumina Spatial — high-fidelity 3D capture streaming by Lumina Spatial LLC"
    />
    <!-- iOS home-screen app name (no web manifest ships with this build). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lumina Spatial .ios Viewer" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Lumina Spatial .ios Viewer</title>
    <style>
      /* Critical white-label overrides: inlined in <head> so they apply
         before any SDK script can paint a frame. Belt-and-braces with the
         MutationObserver brand guard in src/ui/brandGuard.ts. */
      [class*='xgrids' i],
      [id*='xgrids' i],
      [class*='lcc-logo' i],
      [id*='lcc-logo' i],
      [class*='lcc-loading' i],
      [id*='lcc-loading' i],
      [class*='lcc-splash' i],
      [id*='lcc-splash' i],
      img[src*='xgrids' i] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="viewer-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
